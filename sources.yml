# ============================================================
# BORÉALE — CONSORTIUM DE SOURCES
# Ajouter/retirer une source = ajouter/retirer un bloc (ou le
# dire à Fable). enabled:true = collectée automatiquement.
# enabled:false + statut:watch = repérée, collecteur à écrire.
# Santé suivie dans data/health.json (muette => alerte).
# ============================================================

sources:
  # ---- LA source reine : boîte mail d'alertes (palier « précieuses ») ----
  # Les géants (Indeed, Jooble, leboncoin, EURES, jobs.ch…) bloquent les robots
  # mais envoient volontiers leurs offres par email. La boîte dédiée est lue à
  # chaque passage (secrets MAIL_USER / MAIL_APP_PASSWORD).
  - id: mailbox
    nom: "Boîte mail d'alertes (Indeed FR/CH, Jooble, leboncoin, EURES, jobs.ch…)"
    url: imap://imap.gmail.com
    collector: mail
    enabled: true

  # ---- Collectées automatiquement ----
  - id: madameestservie
    nom: Madame est Servie — couples de gardiens
    url: https://www.madameestservie.net/offres-d-emploi-couple-de-gardiens-7.htm
    collector: links
    link_contains: "offre-d-emploi"
    title_any: [couple, gardien]
    geo: fr
    enabled: true

  - id: morganmallet
    nom: Morgan & Mallet — board France
    url: https://www.personneldemaison.agency/jobs/
    collector: links
    link_contains: "offres-d-emplois/"
    title_any: [couple, gardien, intendant, régisseur, cuisini]
    geo: fr
    enabled: true

  - id: laplandstaff
